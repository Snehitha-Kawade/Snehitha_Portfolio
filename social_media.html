    <style>
        /* CARD */
        .poster-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        /* IMAGE */
        .poster-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* transition: 0.4s; */
        }

        /* OVERLAY */
        .poster-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, 0.7);
            color: #fff;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            opacity: 0;
            transition: 0.4s;
            text-align: center;
            padding: 10px;
        }

        /* HOVER EFFECT 
        .poster-card:hover img {
         transform: scale(1.1);
} */

            .poster-card:hover .poster-overlay {
                opacity: 1;
            }

            /* BUTTONS */
            .poster-overlay .btn {
                font-size: 12px;
                padding: 5px 10px;
            }
    </style>
</head>
