<style>
  /* SECTION TITLE */
.web {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 20px;
}

/* CARD CONTAINER */
.shadow {
    background: #fff;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 30px;
}

/* BUTTON RESET */
button.btn {
    border: none;
    background: transparent;
    padding: 10px;
    width: 100%;
}

/* COMMON IMAGE STYLE (VERY IMPORTANT) */
.temp1, .temp2, .temp3, .temp4,
.mockupbb, .mockupcar {
    width: 100%;
   /* height: 300px;  SAME HEIGHT FOR ALL */
    object-fit: cover; /* KEEP IMAGE PROPORTION */
    border-radius: 12px;
    transition: 0.4s;
}

/* HOVER EFFECT (MODERN LOOK) */
button:hover img {
    transform: scale(1.05);
}

/* ADD SHADOW TO IMAGES */
.temp1, .temp2, .temp3, .temp4,
.mockupbb, .mockupcar {
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* SPACING FIX */
.row {
    margin-top: 20px;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
    .temp1, .temp2, .temp3, .temp4,
    .mockupbb, .mockupcar {
        /* height: 200px; */
    }
}
</style>
