 <style>
  /* GENERAL */
body {
    font-family: 'Roboto', sans-serif;
    background: #f8f9fa;
}

/* SECTION HEADINGS */
h1 {
    font-weight: 700;
    letter-spacing: 1px;
}

.ic, .fly {
    font-size: 28px;
    margin-bottom: 20px;
}

/* LOGO IMAGES */
.lg1, .lg2, .lg3, .lg4, .lg5 {
    width: 100%;
    /* height: 100px; */
    object-fit: contain;
    /* padding: 10px; */
    transition: 0.3s;
}

/* ICON IMAGE */
.icons {
    width: 100%;
    /* height: 150px; */
    object-fit: contain;
}

/* FLYER IMAGES */
.BBFLY, .CARFLY {
     width: 100%;
   /* height: 300px; */
    object-fit: cover;
    border-radius: 10px;
    transition: 0.4s;
}

/* VISITING CARDS */
.vstbb, .vstcar {
    width: 100%;
    /* height: 250px; */
    object-fit: cover;
    padding: 20px;
    border-radius: 10px;
    transition: 0.4s;
}

/* BUTTON RESET */
button.btn {
    border: none;
    background: transparent;
    padding: 10px;
}

/* HOVER EFFECT (MODERN LOOK) */
button:hover img {
    transform: scale(1.05);
}

/* SHADOW CARDS */
.row.shadow {
    border-radius: 15px;
    background: #fff;
}

/* SPACING */
.container-fluid {
    padding: 30px 20px;
}

/* RESPONSIVE FIX */
@media (max-width: 768px) {
    .BBFLY, .CARFLY {
        height: 200px;
    }

    .vstbb, .vstcar {
        height: 200px;
    }

    .lg1, .lg2, .lg3, .lg4, .lg5 {
        height: 80px;
    }
}
 </style>
</head>
